<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!-- Ordered List   
    li - list of data 
    -->
     <ol type="I">
        <li>Pizza</li>
        <li>Pasta</li>
        <li>Dessert</li>
        <li>Beverages</li>
     </ol>


     <!-- UnOrdered List -->
      <ul type="circle">
         <li>Pizza</li>
        <li>Pasta</li>
        <li>Dessert</li>
        <li>Beverages</li>
      </ul>
</body>
</html>
