<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DataList</title>
</head>
<body>

    <label>Choose your Country:</label>
    <input type="Country" list="country">
    <datalist id="country">
        <option value="India">
        <option value="Israel">
        <option value="Iran">
        <option value="Russia">
        <option value="USA">
        <option value="China">
    </datalist>

    <label>Choose the food:</label>
    <input type="food" list="food">
    <datalist id="food">
        <option value="Burger">
        <option value="Pizza">
        <option value="Dosa">
    </datalist>

</body>
</html>
