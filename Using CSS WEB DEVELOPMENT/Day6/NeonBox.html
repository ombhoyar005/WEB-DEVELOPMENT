<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            border: 2px solid cyan;
            animation: glowBox 1.5s infinite alternate ease-in-out;
        }

        @keyframes glowBox{
            
            from{ 
                box-shadow: 0 0 5px cyan , 0 0 10px cyan;
            }


            to{
                box-shadow: 0 0 20px yellow , 0 0 40px yellow;
            }



        }
    </style>
</head>
<body style="background-color: black;">
    <div class="box">

    </div>
</body>
</html>
