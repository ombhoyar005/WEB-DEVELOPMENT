<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: cursive; /* For Complete Web Page use body tag */
            margin: 0;
        }
        .banner{
            text-align: center;
            height: 600px;
            font-size: 30px;
            border: 1px solid black;
            box-shadow: 0 2px ;
            color: white;
            
            background-color: bisque;
            background-image: url('https://images.pexels.com/photos/2519218/pexels-photo-2519218.jpeg');
            background-position: center;
            background-size: cover;
            
            filter: brightness(120%);

        }
    </style>
</head>
<body>
    <div class="banner">
        <h1>Coffee Day</h1>
    </div>
</body>
</html>
