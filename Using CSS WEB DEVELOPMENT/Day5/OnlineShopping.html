<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
        }

        .parent{
            display: grid;
            grid-template-columns: repeat(auto-fit , minmax(250px,1fr));
            gap: 30px;
        }

        .product{
            border: 1px solid black;
            overflow: hidden;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 2px 4px black;
        }

        .product img {
            border-radius: 12px;
            object-fit: cover;
            height: 200px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="parent">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1591337676887-a217a6970a8a?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8aXBob25lfGVufDB8fDB8fHww">
            <h2>Iphone</h2>
            <p>$500</p>
            <button>Add To Cart</button>
        </div>

        <div class="product">
            <img src="https://media.istockphoto.com/id/497203317/photo/the-tools-for-a-batsman.webp?a=1&b=1&s=612x612&w=0&k=20&c=4PReFIDWkSfmwkIwwv1gLtz6iMRRe0p2qyQrx1CcmWs=">
            <h2>Bat</h2>
            <p>$100</p>
            <button>Add To Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8SGVhZHBob25lc3xlbnwwfHwwfHx8MA%3D%3D">
            <h2>Headphones</h2>
            <p>$50</p>
            <button>Add To Cart</button>
        </div>


        <div class="product">
            <img src="https://images.unsplash.com/photo-1588609021373-7a646400b387?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGJhZ3BhY2tzfGVufDB8fDB8fHww">
            <h2>$25</h2>
            <p>Bags</p>
            <button>Add To Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8V2F0Y2hlc3xlbnwwfHwwfHx8MA%3D%3D">
            <h2>Watch</h2>
            <p>$1200</p>
            <button>Add To Cart</button>
        </div>


        <div class="product">
            <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8c2hvZXN8ZW58MHx8MHx8fDA%3D">
            <h2>$50</h2>
            <p>Shoes</p>
            <button>Add To Cart</button>
        </div>



    </div>
</body>
</html>
