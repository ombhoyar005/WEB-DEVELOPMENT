<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .product{
       display: flex;
       justify-content: center;
       align-items: center;
       gap: 30px;
       /* flex-direction: column; */

        height: 400px;
        background-color: #f2f2f2;
    }
      
      
    .box{
        border: 1px solid black;
        width: 100px;
        height: 100px;
        text-align: center;
        background-color: beige;
        font-style: italic;
        font-weight: bold;
    }        
    </style>
</head>
<body>
    <!-- Flex Gives Dislay in 1 Dimensional - Either in Row or Column 
    Bydefualt - Row Wise Display : Side by Side 
    -->
    <div class="product">       
        <div class="box">Cake</div>
        <div class="box">Coookie</div>
        <div class="box">Pastry</div>
    </div>    
</body>
</html>
