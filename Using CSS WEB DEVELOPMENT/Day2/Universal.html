<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Styling</title>
    <style>
        /* Tag by Universal Rule--> Symbol = *
         */
        *{
            color: brown;
            background-color: cadetblue;
        }
    </style>
</head>
<body>
    <h1 class="abc">IPL</h1>

    <div class="abc">Football</div>

    <p class="abc">Tennis</p>

    <p>Swimming</p>
</body>
</html>
