<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            color: red;
            background-color: aqua;
            height: 160px;
            width: 150px;
            text-align: center;

        }

        div:hover{
            background-color: blueviolet;
            transition: 2.5s;
        }
        div p{
            color: blue;
        }
        ul{
            color: brown;
            list-style: none;
        }
    </style>
</head>
<body>
    <div>
        <h2>Ashish</h2>
        <p>Full Stack Developer</p>
    </div>

    <ul>
        <li>Water</li>
        <li>Snacks</li>
        <li>Bag</li>
    </ul>

    <p>Profile Card</p>
</body>
</html>
