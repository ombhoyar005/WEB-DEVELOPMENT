<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       
       //1. Arthimetic Operator = + , - , / ,* ,%

       var a = 10
       var b = 7

       console.log(a-b)  //3
       console.log(a+b)  //17
       console.log(a*b) // 170
       console.log(a/b) //1.33

       console.log(a%b)

       console.log(10%2)
       console.log(1%5)


       //2 . Assignment - To Assign Value "="

       var x = 10

       //Assign and Operations

       console.log(x = x + 5)

       console.log(x+=3.5)
       console.log(x-=2)


       //3 Comaprison Operator
       var p = 25
       var q = 20

       console.log(p > q) //25 > 20 - true

       console.log(p < q)

       var abc = 10
       var pqr = 10

       console.log(abc <= pqr)

       const heigh1 = "170" //String
       const height2 = 170  //Number

       // == Only Check The Value Not Data type
       console.log(heigh1 == height2)


       // ===  Check The Value and Data type Both
       console.log(heigh1 === height2)




       //Logical Operator - AND , OR , Negation

       //AND - && : IF BOTH CONDITION IS TRUE THEN ONLY OUTPUT IS TRUE

       var isMember = true

       var TotalPrice =  500

       console.log( isMember && TotalPrice >= 500 )


       //OR || :Only If One Condition is True Then Output is True

       var JioHotstarLogin = true

       var PaidSub = false

       console.log( "Can Watch IPL As Free Access" ,   JioHotstarLogin  ||  PaidSub)

       //Negation - ! : Oppsite Value

       let Netflixsubscription = false

       console.log("Amount Paid" , !Netflixsubscription )

       



    </script>
</body>
</html>
